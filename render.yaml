services:
  - type: web
    name: mori-cabin
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: deepseek
      - key: AI_BASE_URL
        value: https://api.deepseek.com/chat/completions
      - key: AI_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
